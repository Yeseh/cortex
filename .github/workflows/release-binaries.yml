name: Release Binaries (Manual)

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Version to release binaries for (without v prefix)'
                required: true
                type: string
            sha:
                description: 'Commit SHA to build from (defaults to current SHA)'
                required: false
                type: string

permissions:
    contents: write
    actions: read

concurrency:
    group: release-binaries-${{ github.run_id }}
    cancel-in-progress: false

jobs:
    build-binaries:
        name: Build binaries (${{ matrix.platform }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: ubuntu-latest
                      platform: linux-x64
                      exe: ''
                    - runner: ubuntu-24.04-arm
                      platform: linux-arm64
                      exe: ''
                    - runner: macos-14
                      platform: macos-arm64
                      exe: ''
                    - runner: windows-latest
                      platform: windows-x64
                      exe: '.exe'
        runs-on: ${{ matrix.runner }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.sha || github.sha }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build CLI binary
              shell: bash
              run: |
                  mkdir -p release-assets
                  bun build --compile --minify --sourcemap --bytecode ./packages/cli/src/run.ts --outfile "./release-assets/cortex-${{ matrix.platform }}${{ matrix.exe }}"

            - name: Build MCP server binary
              shell: bash
              run: |
                  bun build --compile --minify --sourcemap --bytecode ./packages/server/src/index.ts --outfile "./release-assets/cortex-mcp-${{ matrix.platform }}${{ matrix.exe }}"

            - name: Upload platform binaries
              uses: actions/upload-artifact@v4
              with:
                  name: binaries-${{ matrix.platform }}
                  path: release-assets/*
                  retention-days: 14

    publish-binaries:
        name: Publish binary assets
        needs: build-binaries
        runs-on: ubuntu-latest
        steps:
            - name: Download all binary artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: binaries-*
                  merge-multiple: true
                  path: release-assets

            - name: Generate SHA256 checksums
              shell: bash
              run: |
                  set -euo pipefail
                  cd release-assets

                  : > SHA256SUMS
                  for file in *; do
                    if [[ -f "$file" ]]; then
                      sha256sum "$file" >> SHA256SUMS
                      sha256sum "$file" | awk '{print $1}' > "${file}.sha256"
                    fi
                  done

            - name: Attach binaries to GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ inputs.version }}
                  files: release-assets/*
                  fail_on_unmatched_files: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
